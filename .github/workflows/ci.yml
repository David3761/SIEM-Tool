name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run

  backend:
    name: Backend — PHP / Symfony
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, intl, zip, mbstring, gd
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}

      - run: composer install --no-interaction --prefer-dist

      - name: Lint PHP syntax
        run: find src -name '*.php' -exec php -l {} \;

  python-services:
    name: Python services — tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [agents, rules, capture]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest -v --tb=short
        # Tests may need DB/Redis mocks — failures here highlight services needing fixture work
        continue-on-error: true

  docker-build:
    name: Docker — verify images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for compose
        run: echo "MERCURE_JWT_SECRET=ci_dummy_secret_for_build_validation_only_32chars" > .env

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Build images
        run: docker compose build --parallel
