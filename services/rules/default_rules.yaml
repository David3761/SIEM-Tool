rules:
  - title: "port-scan-001"
    name: "Port Scan Detection"
    description: "Detects rapid connections to many different ports from a single IP"
    type: "threshold"
    severity: "high"
    enabled: true
    config:
      metric: "unique_dst_ports"
      window_seconds: 60
      threshold: 20

  - title: "ssh-bruteforce-001"
    name: "SSH Brute Force"
    description: "Multiple TCP SYN packets to port 22 from the same source"
    type: "threshold"
    severity: "critical"
    enabled: true
    config:
      metric: "event_count"
      filter_dst_port: 22
      filter_protocol: "TCP"
      filter_flags: "SYN"
      window_seconds: 30
      threshold: 10

  - title: "high-traffic-001"
    name: "High Traffic Volume"
    description: "Single IP sending unusually high number of packets"
    type: "threshold"
    severity: "medium"
    enabled: true
    config:
      metric: "event_count"
      window_seconds: 60
      threshold: 500

  - title: "icmp-flood-001"
    name: "ICMP Flood"
    description: "Excessive ICMP packets from a single source"
    type: "threshold"
    severity: "medium"
    enabled: true
    config:
      metric: "event_count"
      filter_protocol: "ICMP"
      window_seconds: 10
      threshold: 100

  - title: "dns-unusual-001"
    name: "Unusual DNS Activity"
    description: "High volume of DNS queries from a single host"
    type: "threshold"
    severity: "low"
    enabled: true
    config:
      metric: "event_count"
      filter_dst_port: 53
      filter_protocol: "UDP"
      window_seconds: 60
      threshold: 200
